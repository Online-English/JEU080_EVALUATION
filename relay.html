<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Relais de Sécurité Centralisé — Mr Kestelyn</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 p-12 font-sans">
    <div class="max-w-xl mx-auto bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-2xl text-center">
        <div class="text-5xl mb-4 animate-pulse">📡</div>
        <h1 class="text-2xl font-black">Relais de Réception Actif</h1>
        <p class="text-sm text-slate-400 mt-2">Ce volet intercepte en tâche de fond les copies émises si vous partagez une session locale.</p>
        <div class="mt-6 bg-slate-950 p-4 rounded-xl border border-slate-800 font-mono text-left text-xs text-emerald-400 h-48 overflow-y-auto" id="relay-logs">
            [Système] En attente de signaux élèves...
        </div>
    </div>
    <script>
        const logsBox = document.getElementById('relay-logs');
        const channel = new BroadcastChannel('arldelattre_channel');
        channel.onmessage = (event) => {
            if (event.data && event.data.type === 'SUBMISSION') {
                const p = event.data.payload;
                const line = document.createElement('p');
                line.innerText = `[${p.time}] Intercepté : ${p.prenom} ${p.nom.toUpperCase()} (${p.classe}) -> ${p.score}/8`;
                logsBox.appendChild(line);
                logsBox.scrollTop = logsBox.scrollHeight;
            }
        };
    </script>
</body>
</html>
